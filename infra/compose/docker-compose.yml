# Full local stack. Requires Docker. For zero-infra dev without Docker, run the
# API directly (SQLite + in-memory fallbacks) — see README "Option A".
name: amvp

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: amvp
      POSTGRES_PASSWORD: amvp
      POSTGRES_DB: amvp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amvp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://amvp:amvp@db:5432/amvp
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /data/storage
      DEV_AUTH_BYPASS: "true"
      API_CORS_ORIGINS: http://localhost:3000
      API_SECRET_KEY: dev-secret-change-me-please-32-characters
    volumes:
      - api_storage:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: AI Medical Vision Platform
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
  api_storage:
