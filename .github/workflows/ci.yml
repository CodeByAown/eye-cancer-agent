name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app
      - name: Mypy
        run: mypy app
      - name: Tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.sqlite3
          DEV_AUTH_BYPASS: "true"
        run: pytest -q

  web:
    name: Web — lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm --filter @amvp/web lint
      - name: Typecheck
        run: pnpm --filter @amvp/web typecheck
      - name: Verify routes
        run: pnpm --filter @amvp/web verify:routes
      - name: Build
        run: pnpm --filter @amvp/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
